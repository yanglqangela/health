<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>饮食日记</title>
  <link rel="stylesheet" href="bootstrap-5.3.6-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="media.css">
  <script src="js/diet.js"></script>
  <style>
	  /* 外层背景条 */
	  .diary-banner {
	    width: 100%;
	    padding: 10px 6; /* 调整背景条高度 */
	    background: linear-gradient(to bottom, #c8e6c9 0%, #f0f8f0 100%);
	    position: relative;
	  }
	  
	  .diary-title {
	    display: inline-block;
	    padding: 10px 30px;
	    border-bottom: 4px solid darkseagreen;
	    background: #fbfada;
	    border-radius: 5px;
	  }

  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md fixed-top navbar-dark" style="background-color: #e0ecde;">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html" style="color: forestgreen;">饮食健康管理系统</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item"><a class="nav-link" href="index.html" style="color: darkseagreen;">首页</a></li>
          <li class="nav-item"><a class="nav-link active" href="diet.html" style="color: darkseagreen;">饮食日记</a></li>
          <li class="nav-item"><a class="nav-link" href="goal.html" style="color: darkseagreen;">健康目标</a></li>
          <li class="nav-item"><a class="nav-link" href="analysis.html" style="color: darkseagreen;">数据分析</a></li>
          <li class="nav-item"><a class="nav-link" href="health.html" style="color: darkseagreen;">健康指标</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html" style="color: darkseagreen;">后台管理</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html" style="color: darkseagreen;">联系我们</a></li>
        </ul>
        <a href="login.html" class="btn btn-outline-light btn-sm me-2">登录/注册</a>
        <a href="profile.html" class="nav-link" style="color: darkseagreen;">个人中心</a>
      </div>
    </div>
  </nav>

  <div class="container" style="margin-top: 80px;">
	 <!-- 外层 Banner 背景条 -->
	 <div class="diary-banner mb-5">
	   <h1 class="diary-title">饮食日记</h1>
	 </div>

   <div class="row mb-3">
     <div class="col-md-6">
       <label class="form-label">选择日期：</label>
       <input type="date" id="recordDate" class="form-control" style="max-width: 200px;">
     </div>
   </div>
   
   <form id="dietForm">
     <div class="row">
       <!-- 左栏 -->
       <div class="col-md-6">
         <div class="mb-3">
           <label for="foodName" class="form-label">食物名称</label>
           <input type="text" id="foodName" class="form-control" placeholder="请输入食物名称" required>
         </div>
         <div class="mb-3">
           <label for="foodTime" class="form-label">时间</label>
           <input type="time" id="foodTime" class="form-control" required>
         </div>
         <div class="mb-3">
           <label for="foodQuantity" class="form-label">数量</label>
           <input type="number" id="foodQuantity" class="form-control" placeholder="请输入数量" value="1" required>
         </div>
         <div class="mb-3">
           <label for="foodCalories" class="form-label">热量 (kcal) <span class="text-muted">- 自动计算</span></label>
           <input type="number" id="foodCalories" class="form-control" placeholder="自动计算" readonly style="background-color: #f0f0f0;">
         </div>
       </div>
   
       <!-- 右栏 -->
       <div class="col-md-6">
         <div class="mb-3">
           <label for="foodCarbs" class="form-label">碳水化合物 (g)</label>
           <input type="number" id="foodCarbs" class="form-control" placeholder="请输入碳水含量" step="0.1" required>
         </div>
         <div class="mb-3">
           <label for="foodProtein" class="form-label">蛋白质 (g)</label>
           <input type="number" id="foodProtein" class="form-control" placeholder="请输入蛋白质含量" step="0.1" required>
         </div>
         <div class="mb-3">
           <label for="foodFat" class="form-label">脂肪 (g)</label>
           <input type="number" id="foodFat" class="form-control" placeholder="请输入脂肪含量" step="0.1" required>
         </div>
       </div>
     </div>
   
     <button type="submit" class="btn btn-success">保存记录</button>
   </form>

    
    <h3 class="mt-5">我的饮食记录</h3>
    <table class="table table-bordered mt-3">
      <thead class="table-light">
        <tr>
          <th>食物名称</th>
          <th>时间</th>
          <th>热量 (kcal)</th>
          <th>碳水 (g)</th>
          <th>蛋白质 (g)</th>
          <th>脂肪 (g)</th>
          <th>数量</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="dietRecordTable">
        <!-- 饮食记录将显示在这里 -->
      </tbody>
    </table>
    
    <!-- 新增营养分析结果 -->
    <div class="card mt-5">
      <div class="card-header">今日营养分析</div>
      <div class="card-body">
        <p id="analysisCalories">总热量：0 kcal</p>
        <p id="analysisCarbs">总碳水：0 g</p>
        <p id="analysisProtein">总蛋白质：0 g</p>
        <p id="analysisFat">总脂肪：0 g</p>
      </div>
    </div>


  <script src="bootstrap-5.3.6-dist/js/bootstrap.min.js"></script>
  <script src="js/DataStorage.js"></script>
  <script src="js/NutritionCalculator.js"></script>
  <script>
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('recordDate').value = today;
    
    document.getElementById('recordDate').addEventListener('change', loadDietRecords);
    
    function calculateCalories() {
      const carbs = parseFloat(document.getElementById('foodCarbs').value) || 0;
      const protein = parseFloat(document.getElementById('foodProtein').value) || 0;
      const fat = parseFloat(document.getElementById('foodFat').value) || 0;
      
      const calories = Math.round((carbs * 4) + (protein * 4) + (fat * 9));
      document.getElementById('foodCalories').value = calories;
    }
    
    document.getElementById('foodCarbs').addEventListener('input', calculateCalories);
    document.getElementById('foodProtein').addEventListener('input', calculateCalories);
    document.getElementById('foodFat').addEventListener('input', calculateCalories);
    
    document.getElementById('dietForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const foodName = document.getElementById('foodName').value;
      const foodTime = document.getElementById('foodTime').value;
      const foodCalories = Number(document.getElementById('foodCalories').value);
      const foodCarbs = Number(document.getElementById('foodCarbs').value);
      const foodProtein = Number(document.getElementById('foodProtein').value);
      const foodFat = Number(document.getElementById('foodFat').value);
      const foodQuantity = Number(document.getElementById('foodQuantity').value);
      const date = document.getElementById('recordDate').value;
      
      const currentUser = DataStorage.load('currentUser') || {};
      const userId = currentUser.username || '游客';
    
      let records = JSON.parse(localStorage.getItem('dietRecords')) || [];
      records.push({ foodName, foodTime, foodCalories, foodCarbs, foodProtein, foodFat, foodQuantity, date, userId });
      localStorage.setItem('dietRecords', JSON.stringify(records));
    
      this.reset();
      document.getElementById('recordDate').value = date;
      document.getElementById('foodQuantity').value = 1;
      loadDietRecords();
    });
    
    function loadDietRecords() {
      const selectedDate = document.getElementById('recordDate').value;
      const currentUser = DataStorage.load('currentUser') || {};
      const currentUserId = currentUser.username;
      
      if (!currentUserId) {
        window.location.href = 'login.html';
        return;
      }
      
      const table = document.getElementById('dietRecordTable');
      table.innerHTML = '';
      const allRecords = JSON.parse(localStorage.getItem('dietRecords')) || [];
      
      const records = allRecords.filter(r => r.date === selectedDate && r.userId === currentUserId);
    
      let totalCalories = 0;
      let totalCarbs = 0;
      let totalProtein = 0;
      let totalFat = 0;
    
      records.forEach((record) => {
        totalCalories += record.foodCalories * record.foodQuantity;
        totalCarbs += record.foodCarbs * record.foodQuantity;
        totalProtein += record.foodProtein * record.foodQuantity;
        totalFat += record.foodFat * record.foodQuantity;
        
        const recordIndex = allRecords.indexOf(record);
        const row = table.insertRow();
        row.innerHTML = `
          <td>${record.foodName}</td>
          <td>${record.foodTime}</td>
          <td>${record.foodCalories}</td>
          <td>${record.foodCarbs}</td>
          <td>${record.foodProtein}</td>
          <td>${record.foodFat}</td>
          <td>${record.foodQuantity}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteRecord(${recordIndex})">删除</button></td>
        `;
      });
    
      document.getElementById('analysisCalories').textContent = `总热量：${totalCalories} kcal`;
      document.getElementById('analysisCarbs').textContent = `总碳水：${totalCarbs} g`;
      document.getElementById('analysisProtein').textContent = `总蛋白质：${totalProtein} g`;
      document.getElementById('analysisFat').textContent = `总脂肪：${totalFat} g`;
      
      if (currentUser.age && currentUser.weight && currentUser.height) {
        const recommended = NutritionCalculator.getRecommendedIntake(currentUser);
        const score = NutritionCalculator.calculateNutritionScore(
          { calories: totalCalories, carbs: totalCarbs, protein: totalProtein, fat: totalFat },
          recommended
        );
        const scoreInfo = NutritionCalculator.getScoreLevel(score);
        
        const dateLabel = selectedDate === today ? '今日' : selectedDate;
        const scoreHtml = `
          <div class="alert alert-${scoreInfo.level === '优秀' || scoreInfo.level === '良好' ? 'success' : 'warning'} mt-3">
            <strong>${dateLabel}营养评分：${score}分 (${scoreInfo.level})</strong>
            <a href="analysis.html" class="btn btn-sm btn-outline-success ms-3">查看详细分析</a>
          </div>
        `;
        
        const existing = document.getElementById('nutritionScore');
        if (existing) {
          existing.innerHTML = scoreHtml;
        } else {
          const div = document.createElement('div');
          div.id = 'nutritionScore';
          div.innerHTML = scoreHtml;
          document.querySelector('.card.mt-5').insertAdjacentElement('afterend', div);
        }
      }
    }
    
    function deleteRecord(index) {
      let records = JSON.parse(localStorage.getItem('dietRecords')) || [];
      records.splice(index, 1);
      localStorage.setItem('dietRecords', JSON.stringify(records));
      loadDietRecords();
    }
    
    window.onload = loadDietRecords;
  </script>
</body>
</html>
