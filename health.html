<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>健康指标 | 饮食健康管理系统</title>
  <link rel="stylesheet" href="bootstrap-5.3.6-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .health-banner {
      width: 100%;
      padding: 15px 0;
      background: linear-gradient(to bottom, #c8e6c9 0%, #f0f8f0 100%);
      text-align: center;
      margin-bottom: 30px;
    }
    .health-title {
      display: inline-block;
      padding: 10px 30px;
      border-bottom: 4px solid darkseagreen;
      background: #fbfada;
      border-radius: 5px;
    }
    .bmi-display {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md fixed-top navbar-dark" style="background-color: #e0ecde;">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html" style="color: forestgreen;">饮食健康管理系统</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item"><a class="nav-link" href="index.html" style="color: darkseagreen;">首页</a></li>
          <li class="nav-item"><a class="nav-link" href="diet.html" style="color: darkseagreen;">饮食日记</a></li>
          <li class="nav-item"><a class="nav-link" href="goal.html" style="color: darkseagreen;">健康目标</a></li>
          <li class="nav-item"><a class="nav-link" href="analysis.html" style="color: darkseagreen;">数据分析</a></li>
          <li class="nav-item"><a class="nav-link active" href="health.html" style="color: darkseagreen;">健康指标</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html" style="color: darkseagreen;">后台管理</a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="profile.html" style="color: darkseagreen;">个人中心</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container" style="margin-top: 100px;">
    <div class="health-banner">
      <h1 class="health-title">健康指标追踪</h1>
    </div>

    <div class="row mb-4">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-success text-white">
            <h5 class="mb-0">记录体重</h5>
          </div>
          <div class="card-body">
            <form id="weightForm">
              <div class="mb-3">
                <label class="form-label">日期</label>
                <input type="date" id="weightDate" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">体重 (kg)</label>
                <input type="number" id="weightValue" class="form-control" step="0.1" required>
              </div>
              <button type="submit" class="btn btn-success">保存</button>
            </form>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card">
          <div class="card-header bg-info text-white">
            <h5 class="mb-0">当前BMI</h5>
          </div>
          <div class="card-body">
            <div id="bmiDisplay" class="bmi-display">--</div>
            <p id="bmiCategory" class="text-center"></p>
            <p id="bmiRisk" class="text-center text-muted"></p>
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">体重变化趋势</div>
          <div class="card-body">
            <canvas id="weightChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="row mb-4">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">历史记录</div>
          <div class="card-body">
            <table class="table table-bordered">
              <thead class="table-light">
                <tr>
                  <th>日期</th>
                  <th>体重 (kg)</th>
                  <th>BMI</th>
                  <th>分类</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="historyTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="bootstrap-5.3.6-dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/DataStorage.js"></script>
  <script src="js/HealthTracker.js"></script>
  <script src="js/ChartManager.js"></script>
  <script src="js/health.js"></script>
</body>
</html>
