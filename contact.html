  <!-- Toast 弹窗 -->

  <script>
    AOS.init();
  </script>

  <!-- 自定义 JS -->
  <script>
    const messageInput = document.getElementById('userMessage');
    const sendMessage = document.getElementById('sendMessage');
    const messagesDiv = document.getElementById('messages');
    const toastEl = new bootstrap.Toast(document.getElementById('liveToast'));

    let messages = JSON.parse(localStorage.getItem('messages')) || [];

    function renderMessages() {
      messagesDiv.innerHTML = '';
      messages.forEach((msg, index) => {
        const card = document.createElement('div');
        card.className = 'card mb-3';
        card.setAttribute('data-aos', 'fade-up');
        card.innerHTML = `
          <div class="card-body d-flex align-items-center">
            <img src="https://api.dicebear.com/7.x/initials/svg?seed=User${index}" width="40" height="40" class="rounded-circle me-3">
            <p class="mb-0">${msg}</p>
          </div>
        `;
        messagesDiv.appendChild(card);
      });
      AOS.refresh();
    }

    sendMessage.onclick = () => {
      const text = messageInput.value.trim();
      if (text) {
        messages.push(text);
        localStorage.setItem('messages', JSON.stringify(messages));
        renderMessages();
        messageInput.value = '';
        toastEl.show();
      }
    };

    renderMessages();

    // AI 回复
    const aiQuestion = document.getElementById('aiQuestion');
    const askAI = document.getElementById('askAI');
    const aiAnswer = document.getElementById('aiAnswer');

    askAI.onclick = () => {
      const question = aiQuestion.value.trim();
      if (question) {
        let reply = "抱歉，我暂时无法理解您的问题，请换个说法试试。";
        const lower = question.toLowerCase();

        if (lower.includes("高血压")) {
          reply = `【高血压饮食建议】
1️⃣ 限盐：每日食盐不超过 5 克。
2️⃣ 多蔬菜水果：摄入富含钾的食物，如香蕉、菠菜。
3️⃣ 少油少糖：避免油炸食品，减少动物脂肪摄入。
4️⃣ 保持适当运动，控制体重。
5️⃣ 定期监测血压，遵医嘱用药。`;
        } else if (lower.includes("糖尿病")) {
          reply = `【糖尿病饮食建议】
✅ 控制总热量，保证营养均衡。
✅ 多吃粗粮、全谷物、低糖水果（如苹果）。
✅ 少吃甜点和含糖饮料。
✅ 少食多餐，定时定量。
✅ 监测血糖，配合医生建议调整用药。`;
        } else if (lower.includes("减肥")) {
          reply = `【科学减肥方法】
🥗 饮食方面：
- 少吃高糖、高油、高盐食物。
- 多摄入膳食纤维，如蔬菜、水果、燕麦。
- 保证足够蛋白质摄入（如鸡胸肉、鱼、豆制品）。

🏃‍♂️ 运动方面：
- 每周至少 150 分钟中等强度有氧运动。
- 增加力量训练，保持肌肉量。

💡 生活习惯：
- 保持充足睡眠，减轻压力，避免暴饮暴食。
- 坚持健康生活方式，不盲目节食。`;
        } else if (lower.includes("早餐")) {
          reply = `【健康早餐建议】
- 燕麦粥+煮鸡蛋+一份水果
- 全麦面包+低脂牛奶+坚果
- 避免油炸、过甜的早餐（如甜甜圈、蛋糕）
- 营养均衡、少糖少油、易消化最适合开启一天`;
        } else if (lower.includes("暴饮暴食") || lower.includes("暴食") || lower.includes("暴吃")) {
          reply = `【如何避免暴饮暴食】
🔑 原因分析：
暴饮暴食常与情绪波动、压力大、作息紊乱有关。

✅ 改善方法：
1️⃣ 定时定量吃饭，不要长时间空腹。
2️⃣ 减少高糖高油零食的储备，少囤积诱惑食物。
3️⃣ 转移注意力，感到情绪低落或压力大时，可以尝试散步、听音乐或与朋友沟通。
4️⃣ 记录饮食日记，意识到过量摄入的模式。
5️⃣ 如有严重暴食倾向，建议咨询专业营养师或心理医生，必要时进行心理干预。

🌿 小贴士：
三餐规律，细嚼慢咽，让大脑有时间接收到“吃饱了”的信号，能有效预防暴食。`;
        }

        aiAnswer.innerText = reply;
        aiAnswer.classList.remove('d-none');
        aiAnswer.style.transform = "scale(0.8)";
        aiAnswer.style.opacity = "0";
        setTimeout(() => {
          aiAnswer.style.transform = "scale(1)";
          aiAnswer.style.opacity = "1";
        }, 50);
      }
    };
	
	window.addEventListener('scroll', () => {
	  const scrollY = window.scrollY;
	  const threshold = 200;
	
	  const aiSection = document.getElementById('ai-section');
	  const messagesSection = document.getElementById('messages-section');
	
	  if (scrollY > threshold) {
	    aiSection.classList.remove('wide');
	    aiSection.classList.add('narrow');
	    messagesSection.classList.remove('wide');
	    messagesSection.classList.add('narrow');
	  } else {
	    aiSection.classList.remove('narrow');
	    aiSection.classList.add('wide');
	    messagesSection.classList.remove('narrow');
	    messagesSection.classList.add('wide');
	  }
	});



  </script>
