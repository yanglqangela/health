<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>健康目标记录</title>
  <link rel="stylesheet" href="bootstrap-5.3.6-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="media.css">
  <style>
	  /* 健康目标标题外层背景条 */
	  .goal-banner {
	    width: 100%;
	    padding: 10px 6;
	    background: linear-gradient(to bottom, #c8e6c9 0%, #f0f8f0 100%);
	    position: relative;
	  }
	  
	  /* 小标题框 */
	  .goal-title {
	    display: inline-block;
	    padding: 10px 30px;
	    border-bottom: 4px solid darkseagreen;
	    background: #fbfada;
	    border-radius: 5px;
	  }
	  

  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md fixed-top navbar-dark" style="background-color: #e0ecde;">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html" style="color: forestgreen;">饮食健康管理系统</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
          <li class="nav-item"><a class="nav-link" href="index.html" style="color: darkseagreen;">首页</a></li>
          <li class="nav-item"><a class="nav-link" href="diet.html" style="color: darkseagreen;">饮食日记</a></li>
          <li class="nav-item"><a class="nav-link active" href="goal.html" style="color: darkseagreen;">健康目标</a></li>
          <li class="nav-item"><a class="nav-link" href="analysis.html" style="color: darkseagreen;">数据分析</a></li>
          <li class="nav-item"><a class="nav-link" href="health.html" style="color: darkseagreen;">健康指标</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html" style="color: darkseagreen;">后台管理</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html" style="color: darkseagreen;">联系我们</a></li>
        </ul>
        <a href="login.html" class="btn btn-outline-light btn-sm me-2">登录/注册</a>
        <a href="profile.html" class="nav-link" style="color: darkseagreen;">个人中心</a>
      </div>
    </div>
  </nav>

  <div class="container" style="margin-top:80px">
    <div class="goal-banner mb-5">
      <h1 class="goal-title">健康目标记录</h1>
    </div>


    <form id="goalForm">
      <div class="row">
        <!-- 左栏 -->
        <div class="col-md-6">
          <div class="mb-3">
            <label for="goalName" class="form-label">目标名称</label>
            <input type="text" id="goalName" class="form-control" placeholder="例如：减肥、增肌" required>
          </div>
        </div>
        <!-- 右栏 -->
        <div class="col-md-6">
          <div class="mb-3">
            <label for="goalTarget" class="form-label">目标数值</label>
            <input type="number" id="goalTarget" class="form-control" placeholder="目标数值（例如：5kg）" required>
          </div>
          <div class="mb-3">
            <label for="goalProgressValue" class="form-label">已完成</label>
            <input type="number" id="goalProgressValue" class="form-control" placeholder="已完成的进度（例如：2kg）" required>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-success">保存目标</button>
    </form>


    <!-- 显示目标进度 -->
    <div id="goalProgress" class="mt-4"></div>

    <!-- 查看所有目标 -->
    <h3 class="mt-5">所有健康目标</h3>
    <table class="table table-bordered mt-3">
      <thead class="table-light">
        <tr>
          <th>目标名称</th>
          <th>目标数值</th>
          <th>已完成</th>
          <th>剩余</th>
        </tr>
      </thead>
      <tbody id="goalTable"></tbody>
    </table>
  </div>

  <script src="bootstrap-5.3.6-dist/js/bootstrap.min.js"></script>
  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
    if (!currentUser.username) {
      window.location.href = 'login.html';
    }

    window.onload = function() {
      loadGoals();
    };

    document.getElementById('goalForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const goalName = document.getElementById('goalName').value;
      const goalTarget = document.getElementById('goalTarget').value;
      const goalProgressValue = document.getElementById('goalProgressValue').value;

      let goals = JSON.parse(localStorage.getItem('healthGoals')) || [];
      goals.push({ 
        goalName, 
        goalTarget, 
        goalProgressValue,
        userId: currentUser.username
      });
      localStorage.setItem('healthGoals', JSON.stringify(goals));

      document.getElementById('goalName').value = '';
      document.getElementById('goalTarget').value = '';
      document.getElementById('goalProgressValue').value = '';

      loadGoals();
    });

    function loadGoals() {
      const table = document.getElementById('goalTable');
      table.innerHTML = '';
      const allGoals = JSON.parse(localStorage.getItem('healthGoals')) || [];
      const goals = allGoals.filter(g => g.userId === currentUser.username);
      
      goals.forEach((goal) => {
        const remaining = goal.goalTarget - goal.goalProgressValue;
        const row = table.insertRow();
        row.innerHTML = `
          <td>${goal.goalName}</td>
          <td>${goal.goalTarget}kg</td>
          <td>${goal.goalProgressValue}kg</td>
          <td>${remaining}kg</td>
        `;
      });

      updateProgress(goals);
    }

    function updateProgress(goals) {
      let html = '';
      goals.forEach(goal => {
        const remaining = goal.goalTarget - goal.goalProgressValue;
        html += `
          <div class="alert alert-info" role="alert">
            <strong>目标：</strong>${goal.goalName} ${goal.goalTarget}kg <br>
            <strong>已完成：</strong>${goal.goalProgressValue}kg <br>
            <strong>剩余：</strong>${remaining}kg
          </div>
        `;
      });
      document.getElementById('goalProgress').innerHTML = html;
    }
  </script>
</body>
</html>
