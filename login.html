<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>用户登录 | 饮食健康管理系统</title>
  <link rel="stylesheet" href="bootstrap-5.3.6-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/login.js"></script>
</head>
<body>
  <div class="container">
    <div class="login-container">
      <h2>用户登录</h2>

      <!-- 登录表单 -->
      <form>
        <div class="mb-3">
          <input type="text" class="form-control" id="loginUsername" placeholder="输入用户名" required>
        </div>
        <div class="mb-3">
          <input type="password" class="form-control" id="loginPassword" placeholder="输入密码" required>
        </div>
        <button type="button" class="btn btn-login" onclick="login()">立即登录</button>
      </form>

      <div class="form-text">
        <a href="register.html">注册账号</a> | <a href="#">忘记密码</a>
      </div>
    </div>
  </div>

  <script src="bootstrap-5.3.6-dist/js/bootstrap.min.js"></script>
  <script>
    function login() {
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
  
      let users = JSON.parse(localStorage.getItem('users')) || [];
      const user = users.find(u => u.username === username && u.password === password);
  
      if (user) {
        // 自动识别 admin 账号
        if (user.username === 'admin-ylh') user.isAdmin = true;
        else user.isAdmin = false;
  
        // 设置两个 key，兼容所有页面
        localStorage.setItem('loggedInUser', JSON.stringify(user));
        localStorage.setItem('currentUser', JSON.stringify(user));
  
        alert('登录成功！');
        window.location.href = 'index.html';
      } else {
        alert('用户名或密码错误！');
      }
    }
  </script>

</body>
</html>
